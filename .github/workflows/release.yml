name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ZIG_VERSION: 0.15.2

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi

          case "$tag" in
            v*) ;;
            *)
              printf 'release tag must start with v: %s\n' "$tag" >&2
              exit 1
              ;;
          esac

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Create manual tag
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            printf 'tag %s already exists locally\n' "$TAG"
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            printf 'tag %s already exists on origin\n' "$TAG"
            exit 0
          fi

          git tag "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"

  build:
    name: build ${{ matrix.asset_platform }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_platform: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - asset_platform: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - asset_platform: darwin-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
          - asset_platform: darwin-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Zig
        id: zig-cache
        uses: actions/cache@v4
        with:
          path: vendor/zig-${{ env.ZIG_VERSION }}
          key: zig-${{ env.ZIG_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Bootstrap Zig
        run: |
          set -euo pipefail
          zig_path="vendor/zig-${ZIG_VERSION}/zig"
          if [ -x "$zig_path" ] && [ "$("$zig_path" version)" = "$ZIG_VERSION" ]; then
            printf 'zig %s restored from cache at %s\n' "$ZIG_VERSION" "$zig_path"
            exit 0
          fi
          scripts/bootstrap_zig_0_15_2.sh

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Build release binary
        env:
          GMUX_BUILD_COMMIT: ${{ github.sha }}
        run: cargo build --release --locked --features self-update --target "${{ matrix.target }}"

      - name: Package archive
        env:
          ASSET_PLATFORM: ${{ matrix.asset_platform }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          package="gmux-$ASSET_PLATFORM"
          staging="dist/$package"
          mkdir -p "$staging"
          cp "target/$TARGET/release/gmux" "$staging/gmux"
          cp README.md LICENSE "$staging/"
          mkdir -p "$staging/completions"
          "$staging/gmux" completions bash > "$staging/completions/gmux.bash"
          "$staging/gmux" completions zsh > "$staging/completions/_gmux"
          "$staging/gmux" completions fish > "$staging/completions/gmux.fish"
          tar -C "$staging" -czf "dist/$package.tar.gz" gmux README.md LICENSE completions

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: gmux-${{ matrix.asset_platform }}
          path: dist/gmux-${{ matrix.asset_platform }}.tar.gz
          if-no-files-found: error

  release:
    name: publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04
    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "$TAG" dist/*.tar.gz dist/SHA256SUMS \
              --title "$TAG" \
              --generate-notes
          fi
